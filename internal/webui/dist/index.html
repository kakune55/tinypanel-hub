<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tinypanel-hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <h1>tinypanel-hub</h1>
        <span id="healthDot" class="status-dot" title="health"></span>
      </div>

      <div class="stack">
        <section class="section">
          <div class="section-title">
            <h2>身份</h2>
          </div>
          <div class="panel form-grid">
            <input id="adminToken" placeholder="Admin Token">
            <div class="two">
              <input id="newUserName" placeholder="用户名" value="Alice">
              <input id="newUserEmail" placeholder="邮箱">
            </div>
            <input id="newUserToken" placeholder="用户 Token，可留空自动生成">
            <button class="accent" id="createUserBtn">创建用户</button>
            <input id="userToken" placeholder="当前用户 Token">
            <div class="actions">
              <button id="saveTokensBtn">保存</button>
              <button class="secondary" id="loadMeBtn">读取用户</button>
            </div>
            <div id="identityNotice" class="notice">保存 token 后即可使用用户侧功能。</div>
          </div>
        </section>
      </div>
    </aside>

    <main>
      <section class="hero">
        <div class="hero-main">
          <div>
            <p class="eyebrow">Device Center</p>
            <h2 id="heroTitle">未选择设备</h2>
          </div>
          <div class="hero-meta">
            <span class="pill mono" id="heroDeviceID">device: -</span>
            <span class="pill" id="heroBound">未绑定</span>
            <span class="pill" id="heroUser">user: -</span>
          </div>
        </div>
        <div class="metric-grid">
          <div class="metric"><span>设备</span><strong id="metricDevices">0</strong></div>
          <div class="metric"><span>待确认消息</span><strong id="metricPending">0</strong></div>
          <div class="metric"><span>TODO</span><strong id="metricTodos">0</strong></div>
        </div>
      </section>

      <nav class="tabs">
        <button class="active" data-tab="devices">设备</button>
        <button data-tab="messages">消息</button>
        <button data-tab="todos">TODO</button>
        <button data-tab="weather">天气</button>
        <button data-tab="telemetry">遥测</button>
        <button data-tab="raw">调试</button>
      </nav>

      <section id="tab-devices" class="tab-panel active">
        <div class="grid">
          <div class="panel section">
            <div class="section-title">
              <h3>我的设备</h3>
              <button class="secondary" id="refreshDevicesBtn">刷新</button>
            </div>
            <div id="devicesList" class="list"></div>
          </div>
          <div class="panel section">
            <div class="section-title">
              <h3>设备操作</h3>
            </div>
            <input id="renameDeviceName" placeholder="新设备名称">
            <div class="actions">
              <button id="renameDeviceBtn">重命名</button>
              <button class="danger" id="deleteDeviceBtn">删除设备</button>
            </div>
            <div class="notice">选择设备后可以重命名、删除、发送消息和查询遥测。</div>
          </div>
          <div class="panel section">
            <div class="section-title">
              <h3>绑定设备</h3>
            </div>
            <div class="two">
              <input id="bindCode" placeholder="绑定码">
              <input id="bindName" placeholder="设备名称" value="书桌屏幕">
            </div>
            <button class="accent" id="bindDeviceBtn">绑定到当前用户</button>
            <div id="deviceNotice" class="notice">输入设备显示的绑定码即可完成绑定。</div>
          </div>
        </div>
      </section>

      <section id="tab-messages" class="tab-panel">
        <div class="grid">
          <div class="panel section">
            <div class="section-title">
              <h3>发送消息</h3>
            </div>
            <textarea id="messageBody" placeholder="发送给当前设备的消息"></textarea>
            <select id="messagePriority">
              <option value="normal">normal</option>
              <option value="high">high</option>
            </select>
            <button class="accent" id="sendMessageBtn">发送</button>
          </div>
        </div>
        <div class="panel section">
          <div class="section-title">
            <h3>消息历史</h3>
            <button class="secondary" id="refreshMessagesBtn">刷新</button>
          </div>
          <div id="messageHistory" class="list"></div>
        </div>
      </section>

      <section id="tab-todos" class="tab-panel">
        <div class="grid">
          <div class="panel section">
            <div class="section-title">
              <h3>新建 TODO</h3>
            </div>
            <input id="todoText" placeholder="例如：整理桌面">
            <select id="todoStatus">
              <option value="0">未完成</option>
              <option value="1">正在完成</option>
              <option value="2">已完成</option>
            </select>
            <button class="accent" id="createTodoBtn">创建</button>
          </div>
          <div class="panel section">
            <div class="section-title">
              <h3>TODO 列表</h3>
              <button class="secondary" id="refreshTodosBtn">刷新</button>
            </div>
            <div id="todosList" class="list"></div>
          </div>
        </div>
      </section>

      <section id="tab-weather" class="tab-panel">
        <div class="grid">
          <div class="panel section">
            <div class="section-title">
              <h3>天气</h3>
              <button class="secondary" id="refreshWeatherBtn">刷新</button>
            </div>
            <div id="weatherBox" class="list"></div>
          </div>
          <div class="panel section">
            <div class="section-title">
              <h3>快照</h3>
              <button class="secondary" id="refreshSnapshotBtn">刷新</button>
            </div>
            <pre id="snapshotRaw">{}</pre>
          </div>
        </div>
      </section>

      <section id="tab-telemetry" class="tab-panel">
        <div class="grid">
          <div class="panel section">
            <div class="section-title">
              <h3>当前设备遥测</h3>
              <button class="secondary" id="refreshTelemetryBtn">刷新</button>
            </div>
            <div id="telemetryList" class="list"></div>
          </div>
        </div>
      </section>

      <section id="tab-raw" class="tab-panel">
        <div class="panel section">
          <div class="section-title">
            <h3>最近响应</h3>
            <button class="secondary" id="clearLogBtn">清空</button>
          </div>
          <pre id="rawLog">Ready.</pre>
        </div>
      </section>
    </main>
  </div>

  <div id="telemetryModal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <h3>遥测详情</h3>
        <button class="secondary" id="closeTelemetryModalBtn">关闭</button>
      </div>
      <pre id="telemetryRaw">{}</pre>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>

</html>
